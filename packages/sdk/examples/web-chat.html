<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STVOR Web Chat - Vanilla JS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            display: flex;
            height: 600px;
        }

        .sidebar {
            width: 280px;
            background: #f9fafb;
            padding: 20px;
            border-right: 1px solid #e5e7eb;
            overflow-y: auto;
        }

        .sidebar h3 {
            color: #667eea;
            margin-bottom: 12px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .settings {
            margin-bottom: 20px;
        }

        .setting-group {
            margin-bottom: 12px;
        }

        .setting-group label {
            display: block;
            font-size: 12px;
            color: #666;
            margin-bottom: 4px;
            font-weight: 500;
        }

        .setting-group input,
        .setting-group select {
            width: 100%;
            padding: 8px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 12px;
            font-family: inherit;
        }

        .connect-btn {
            width: 100%;
            padding: 10px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .connect-btn:hover {
            background: #764ba2;
        }

        .connect-btn:disabled {
            background: #d1d5db;
            cursor: not-allowed;
        }

        .contacts {
            margin-bottom: 20px;
        }

        .contact-item {
            padding: 10px;
            background: white;
            border-radius: 6px;
            margin-bottom: 6px;
            cursor: pointer;
            border: 1px solid #e5e7eb;
            font-size: 12px;
            transition: all 0.2s;
        }

        .contact-item:hover {
            background: #f3f4f6;
            border-color: #667eea;
        }

        .add-contact-btn {
            width: 100%;
            padding: 8px;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 20px;
            background: white;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 18px;
            color: #333;
        }

        #status {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
            color: white;
        }

        .status-badge.connected {
            background: #10b981;
        }

        .status-badge.disconnected {
            background: #ef4444;
        }

        .user-id {
            font-size: 12px;
            color: #666;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            display: flex;
            margin-bottom: 8px;
        }

        .message.sent {
            justify-content: flex-end;
        }

        .message.received {
            justify-content: flex-start;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            word-break: break-word;
        }

        .message.sent .message-content {
            background: #667eea;
            color: white;
        }

        .message.received .message-content {
            background: #e5e7eb;
            color: #333;
        }

        .message-header {
            display: flex;
            gap: 8px;
            font-size: 11px;
            color: #666;
            margin-bottom: 4px;
        }

        .message.sent .message-header {
            justify-content: flex-end;
            color: #999;
        }

        .encrypted-badge {
            font-size: 10px;
            margin-top: 4px;
            opacity: 0.8;
        }

        .input-area {
            padding: 20px;
            background: #f9fafb;
            border-top: 1px solid #e5e7eb;
            display: flex;
            gap: 8px;
        }

        #peerSelect {
            padding: 10px 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 13px;
            font-family: inherit;
            min-width: 150px;
        }

        #messageInput {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 13px;
            font-family: inherit;
        }

        .send-btn {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
        }

        .send-btn:hover {
            background: #764ba2;
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                height: auto;
            }

            .sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid #e5e7eb;
            }

            #messages {
                height: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <h3>Settings</h3>

            <div class="settings">
                <div class="setting-group">
                    <label>User ID (Email)</label>
                    <input
                        id="userId"
                        type="email"
                        value="user@example.com"
                        placeholder="your@email.com"
                    />
                </div>

                <div class="setting-group">
                    <label>Relay Server URL</label>
                    <input
                        id="relayUrl"
                        type="text"
                        value="ws://localhost:8080"
                        placeholder="ws://localhost:8080"
                    />
                </div>

                <button class="connect-btn" id="connectBtn">🚀 Connect</button>
            </div>

            <h3>Contacts</h3>

            <div class="contacts">
                <select id="peerSelect">
                    <option value="">Select peer...</option>
                    <option value="alice@example.com">Alice (alice@example.com)</option>
                    <option value="bob@example.com">Bob (bob@example.com)</option>
                    <option value="charlie@example.com">Charlie (charlie@example.com)</option>
                </select>
            </div>

            <button class="add-contact-btn" id="addContactBtn">➕ Add Contact</button>
        </div>

        <!-- Main Chat Area -->
        <div class="main">
            <div class="header">
                <h1>🔐 Secure Chat</h1>
                <div id="status">
                    <span class="status-badge disconnected">✗ Disconnected</span>
                </div>
            </div>

            <div id="messages"></div>

            <div class="input-area">
                <input
                    id="messageInput"
                    type="text"
                    placeholder="Type a message..."
                    maxlength="1000"
                />
                <button class="send-btn" id="sendBtn">Send</button>
            </div>
        </div>
    </div>

    <!-- Include the JavaScript -->
    <script src="./web-chat-vanilla.js"></script>

    <!-- Or use via CDN when published -->
    <!-- <script src="https://unpkg.com/stvor-sdk/dist/web-sdk.js"></script> -->
</body>
</html>
